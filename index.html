    <style>
        :root {
            --primary-color: #00c4cc;
            --bg-dark: #0f0f0f;
            --sidebar-bg: #181818;
            --text-main: #ffffff;
            --text-dim: #aaaaaa;
        }

        body { 
            margin: 0; 
            display: flex; 
            height: 100vh; 
            background: var(--bg-dark); 
            color: var(--text-main); 
            font-family: 'Inter', 'Segoe UI', sans-serif; 
            overflow: hidden; 
            overscroll-behavior-y: contain;
        }

        /* Sidebar */
        #sidebar { 
            width: 350px; 
            background: var(--sidebar-bg); 
            display: flex; 
            flex-direction: column; 
            box-shadow: 4px 0 15px rgba(0,0,0,0.5);
            z-index: 10;
            transition: transform 0.3s ease;
            padding-top: env(safe-area-inset-top);
            padding-bottom: env(safe-area-inset-bottom);
        }

        #search, #categoryFilter, #qualitySelect {
            padding: 10px 15px; 
            background: #252525; 
            border: 1px solid #333; 
            margin: 5px 10px;
            border-radius: 8px;
            color: white; 
            font-size: 0.9rem; 
            outline: none;
            transition: border-color 0.3s;
        }

        #search:focus { border-color: var(--primary-color); }

        #channelList { flex: 1; overflow-y: auto; padding: 5px; scroll-behavior: smooth;
        mask-image: linear-gradient(to bottom, transparent, black 5%, black 95%, transparent);
    -webkit-mask-image: linear-gradient(to bottom, transparent, black 5%, black 95%, transparent);
    -webkit-overflow-scrolling: touch; scrollbar-width: thin;
    will-change: transform; transform: translateZ(0);
}

        #favQuickAccess.active:hover {
    background: #ffdb6e;
    transform: translateY(-2px);
}

        .channel { 
            padding: 10px 12px; 
            margin: 4px 8px;
            border-radius: 8px;
            cursor: pointer; 
            display: flex; 
            align-items: center; 
            justify-content: space-between;
            transition: all 0.2s ease;
            background: rgba(255, 255, 255, 0.03);
            scroll-margin: 10px;
            outline: none;
            user-select: none;
            overflow: hidden;
        }

        .channel:hover { background: #333; transform: translateX(5px); }
        .channel.active { background: rgba(0, 196, 204, 0.15); border-left: 4px solid var(--primary-color); }

        .channel img { 
            width: 40px; 
            height: 30px; 
            margin-right: 12px; 
            object-fit: contain; 
            background: #222; 
            border-radius: 4px;
            flex-shrink: 0; 
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
        }

        .channel img[src] {
             opacity: 1;
        }

        .channel span { 
            font-size: 0.95rem; 
            font-weight: 500; 
            line-height: 1.3;
            color: var(--text-main);
            
            flex: 1;
            margin-right: 10px;
            pointer-events: none;
            user-select: none;

            display: -webkit-box;
            -webkit-line-clamp: 2; 
            -webkit-box-orient: vertical;
            overflow: hidden;
            word-break: break-word;
        }
        
        .fav-btn {
            cursor: pointer;
            font-size: 1.6rem;
            color: #444;
            transition: transform 0.2s ease, color 0.2s ease;

            padding: 10px 15px;
            pointer-events: auto !important;
            position: relative;
            z-index: 10;
            
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            user-select: none;
            -webkit-tap-highlight-color: transparent;           
        }
        
        .fav-btn.active { color: #ffca28; text-shadow: 0 0 5px rgba(255, 202, 40, 0.7); }
        .fav-btn:hover { transform: scale(1.25); color: #666; }

        #loadMore:hover { background: rgba(0, 196, 204, 0.1); border-color: var(--primary-color); }

#channelList::-webkit-scrollbar {

}

        #loader { 
            display: none; position: absolute; border: 4px solid #f3f3f3; 
            border-top: 4px solid var(--primary-color); border-radius: 50%; 
            width: 40px; height: 40px; animation: spin 1s linear infinite; z-index: 5;
        }

        @keyframes spin { 100% { transform: rotate(360deg); } }

        #errorMessage {
    display: none; 
    position: fixed; /* 'fixed' est préférable à 'absolute' pour flotter au-dessus de tout */
    bottom: 30px; 
    left: 50%;
    transform: translateX(-50%); /* Centre parfaitement le bouton */
    background: rgba(255, 0, 0, 0.8); 
    color: white; 
    padding: 12px 24px; 
    border-radius: 50px; /* Look bouton plus moderne */
    font-weight: bold; 
    z-index: 9999; 
    box-shadow: 0 4px 15px rgba(0,0,0,0.3);
    cursor: pointer;
    text-align: center;
    white-space: nowrap;
    animation: slideUp 0.4s ease-out, pulse 2s infinite;
}

@keyframes slideUp {
    from { bottom: -50px; opacity: 0; }
    to { bottom: 30px; opacity: 1; }
}

@keyframes pulse {
    0% { box-shadow: 0 0 0 0 rgba(255, 0, 0, 0.7); }
    70% { box-shadow: 0 0 0 10px rgba(255, 0, 0, 0); }
    100% { box-shadow: 0 0 0 0 rgba(255, 0, 0, 0); }
}

<script type="module">
    import * as iptvParser from 'https://cdn.jsdelivr.net/npm/iptv-playlist-parser@0.15.2/+esm';

            const DEFAULT_LOGO = "data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSI0MCIgaGVpZ2h0PSIzMCIgdmlld0JveD0iMCAwIDQwIDMwIj48cmVjdCB3aWR0aD0iMTAwJSIgaGVpZ2h0PSIxMDAlIiBmaWxsPSIjMzMzIi8+PHRleHQgeD0iNTAlIiB5PSI1MCUiIGZpbGw9IiNhYWEiIGZvbnQtc2l6ZT0iMTIiIGR5PSIuM2VtIiB0ZXh0LWFuY2hvcj0ibWlkZGxlIj5UVjwvdGV4dD48L3N2Zz4=";

    let allChannels = [];
    let filteredChannels = [];
    let displayedCount = 30;
    let hls = null;
    let shakaPlayer = null;
    let wakeLock = null;
    let sessionTimeout = null;
    const INACTIVITY_DELAY = 10 * 60 * 1000; // 10 minutes

    let isAuthorized = localStorage.getItem("freelink_private_access") === "true";
    let userChannels = JSON.parse(localStorage.getItem('freelink_user_channels')) || [];
    let favorites = JSON.parse(localStorage.getItem('freelink_favs')) || [];

qualitySelect.onchange = () => {

};


    let deferredPrompt; // Stocke l'événement d'installation

window.addEventListener('beforeinstallprompt', (e) => {
    // Empêche Chrome d'afficher la bannière automatique
    e.preventDefault();
    // Garde l'événement pour plus tard
    deferredPrompt = e;
    // Affiche ton bouton personnalisé
    if (installBtn) installBtn.style.display = 'flex';
});

// Logique du clic sur ton bouton
if (installBtn) {
    installBtn.onclick = async () => {
        if (deferredPrompt) {
            deferredPrompt.prompt(); // Affiche la fenêtre système
            const { outcome } = await deferredPrompt.userChoice;
            if (outcome === 'accepted') {
                console.log('L\'utilisateur a installé la PWA');
            }
            deferredPrompt = null;
            installBtn.style.display = 'none';
        }
    };
}

window.addEventListener('appinstalled', () => {
    if (installBtn) installBtn.style.display = 'none';
    deferredPrompt = null;
});

    async function init() {
    try {
        allChannels = [];
        filteredChannels = [];
        displayChannels(); 

        // 1. Chargement Parallèle (Simplifié : Monde + Club + Adulte)
        const [worldRes, clubRes, adultRes] = await Promise.allSettled([
            fetch(`https://iptv-org.github.io/iptv/index.m3u?t=${Date.now()}`).then(r => r.text()),
            // On charge club_data.json systématiquement si autorisé
            isAuthorized ? fetch('club_data.json').then(r => r.ok ? r.json() : []).catch(() => []) : Promise.resolve([]),
            isAuthorized ? fetch('adult.m3u').then(r => r.ok ? r.text() : "") : Promise.resolve("")
        ]);

        // 2. Traitement Monde
        let worldChannels = [];
        if (worldRes.status === "fulfilled") {
            try {
                const playlist = iptvParser.parse(worldRes.value);
                worldChannels = playlist.items;
            } catch (e) { console.error("Erreur parsing M3U Monde"); }
        }

        // 3. Traitement Club (Inclut désormais vos chaînes Arabes personnalisées)
        let clubChannels = [];
        if (clubRes.status === "fulfilled" && Array.isArray(clubRes.value)) {
            clubChannels = clubRes.value.map(ch => ({ 
                ...ch, 
                private: true, 
                group: ch.group || { title: "CLUB" } 
            }));
        }

        // 4. Traitement des chaînes Adultes
        let adultChannels = [];
        if (isAuthorized && adultRes.status === "fulfilled" && adultRes.value && adultRes.value.includes("#EXTM3U")) {
            try {
                const playlist = iptvParser.parse(adultRes.value);
                adultChannels = playlist.items.map(ch => ({
                    ...ch,
                    private: true,
                    group: (ch.group && ch.group.title) ? ch.group : { title: "ADULTE 🔥" }
                }));
            } catch (e) { console.error("Crash Adulte évité"); }
        }

        // 5. Fusion Optimisée
        const seenUrls = new Set();
        // Plus besoin de arabChannels ici
        const combined = [...clubChannels, ...adultChannels, ...worldChannels, ...userChannels];

        allChannels = combined.filter(ch => {
            if (seenUrls.has(ch.url)) return false;
            seenUrls.add(ch.url);
            return true;
        });
        
        // 6. Mise à jour de l'UI
        updateCategories();
        updateFavCount();
        setupPrivateUI();
        
        // 7. Premier affichage
        if (searchInput.value.trim() === "") {
            filteredChannels = isAuthorized ? allChannels : allChannels.filter(ch => !ch.private);
            displayedCount = 30;
            displayChannels(false);
        }

        handleAutoResume();

    } catch (err) {
        console.error("Erreur Init fatale:", err);
        channelList.innerHTML = `<p style="color:red; padding:10px;">Erreur : ${err.message}</p>`;
    }
}

    // --- 3. AFFICHAGE ET RENDU ---
    function displayChannels(isRefresh = false) {
        const scrollPos = channelList.scrollTop;
        
        if (filteredChannels.length === 0) {
            channelList.innerHTML = allChannels.length === 0 
                ? `<div class="loader-text" style="text-align:center; padding:20px; color:var(--text-dim);">Chargement...</div>`
                : `<div class="empty-state">Aucune chaîne trouvée.</div>`;
            updateLoadMoreButton();
            return;
        }

        if (!isRefresh) {
            displayedCount = 30;
            channelList.innerHTML = ''; 
        }
        
        renderChunk(filteredChannels.slice(isRefresh ? displayedCount - 100 : 0, displayedCount), isRefresh);
        
        if (isRefresh && !showingFavorites) channelList.scrollTop = scrollPos;
        updateLoadMoreButton();
    }

    function renderChunk(chunk, append = false) {
        const fragment = document.createDocumentFragment();
        const lastChannelUrl = localStorage.getItem('freelink_last_channel');


        if (!append) channelList.innerHTML = '';

        chunk.forEach(ch => {
            if (append && channelList.querySelector(`.channel[data-url="${CSS.escape(ch.url)}"]`)) return;

            const cleanName = ch.name.replace(/\[.*?\]|\(.*?\)/g, '').trim();
            const isFav = favorites.some(f => f.url === ch.url);
            const isPrivate = ch.private === true || (ch.group && (ch.group.title === "CLUB" || ch.group.title === "MES FLUX"));
            
            const div = document.createElement('div');
            div.className = 'channel';
            div.tabIndex = 0;
            div.setAttribute('data-url', ch.url);
            div.setAttribute('data-group', ch.group.title);

            if (lastChannelUrl === ch.url) div.classList.add('active');
            
            const deleteBtnHtml = (ch.group && ch.group.title === "MES FLUX") 
                ? `<span class="delete-channel" title="Supprimer">🗑️</span>` : '';
            
            const logoSrc = (ch.tvg && ch.tvg.logo && ch.tvg.logo.trim() !== "") ? ch.tvg.logo : DEFAULT_LOGO;

            div.innerHTML = `
        <div class="logo-container" style="width:40px; height:30px; flex-shrink:0; background:#222; border-radius:4px; overflow:hidden;">
            <img src="${logoSrc}" loading="lazy" decoding="async" alt="" 
                 style="width:100%; height:100%; object-fit:cover;" 
                 onerror="this.src='${DEFAULT_LOGO}'">
        </div>
        <span style="flex-grow:1; margin-left:10px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;">
            ${isPrivate ? '🔒 ' : ''}${cleanName}
        </span>
        <div class="actions" style="display: flex; align-items: center;">
            ${deleteBtnHtml}
            <span class="fav-btn ${isFav ? 'active' : ''}">★</span>
        </div>
            `;

            // --- 1. ÉCOUTEUR PRINCIPAL (LANCER LA CHAINE) ---
            div.addEventListener('click', (e) => {
                // Si on clique sur l'étoile ou la poubelle, on ne lance PAS la vidéo
                if (e.target.closest('.fav-btn') || e.target.closest('.delete-channel')) {
                    return; 
                }
                const currentActive = channelList.querySelector('.channel.active');
                if (currentActive) currentActive.classList.remove('active');
                div.classList.add('active');
                playStream(ch);
            });

            // --- 2. ÉCOUTEUR SUPPRIMER ---
            const btnDel = div.querySelector('.delete-channel');
            if(btnDel) { 
                btnDel.addEventListener('click', (e) => {
                    e.stopPropagation();
                    if(confirm("Supprimer cette chaîne ?")) {
                        userChannels = userChannels.filter(c => c.url !== ch.url);
                        localStorage.setItem('freelink_user_channels', JSON.stringify(userChannels));
                        allChannels = allChannels.filter(c => c.url !== ch.url);
                        filteredChannels = filteredChannels.filter(c => c.url !== ch.url);
                        displayChannels(false);
                    }
                });
            }

            // --- 3. ÉCOUTEUR FAVORIS (CORRIGÉ) ---
            const favBtn = div.querySelector('.fav-btn');
            favBtn.addEventListener('click', (e) => { 
                e.preventDefault();
                e.stopPropagation(); // Bloque la propagation vers le 'div' parent
                toggleFavorite(ch); 
            });

            fragment.appendChild(div);
        });

        channelList.appendChild(fragment);
    }

    // --- 4. LECTURE VIDÉO ---
    async function playStream(channel) {
        const url = typeof channel === 'string' ? channel : channel.url;
        const name = typeof channel === 'string' ? "Flux" : channel.name;
        const logo = typeof channel === 'string' ? "" : (channel.tvg.logo || '');
        
        const urlLower = url.toLowerCase().split(/[?#]/)[0];
        const isMP4 = urlLower.endsWith('.mp4');
        const isDASH = urlLower.endsWith('.mpd');

        localStorage.setItem('freelink_last_channel', url);
        errorMessage.style.display = 'none';
        loader.style.display = 'block';
        qualitySelect.style.display = 'none';

        document.getElementById('currentTitle').innerText = name.replace(/\[.*?\]|\(.*?\)/g, '').trim();
        const logoImg = document.getElementById('currentLogo');
        logoImg.src = logo || DEFAULT_LOGO;
        logoImg.onerror = function() { this.src = DEFAULT_LOGO; this.onerror = null; };
        document.getElementById('currentChannelInfo').style.display = 'flex';

        // Nettoyage des instances précédentes
        if (hls) { hls.destroy(); hls = null; }
        if (shakaPlayer) { await shakaPlayer.destroy(); shakaPlayer = null; }
        
        video.pause();
        video.src = "";
        video.load();

        const startPlayback = () => {
            video.play().then(() => {
                errorMessage.style.display = 'none';
                loader.style.display = 'none';
            }).catch(error => {
                console.warn("Autoplay bloqué.");
                video.muted = true;
                video.play();
                errorMessage.innerHTML = "🔊 Sourdine activée. Touchez pour le son.";
                errorMessage.style.display = 'block';
                loader.style.display = 'none';
            });
        };

        // LOGIQUE DE LECTURE MULTI-FORMAT
        if (isMP4) {
            video.src = url;
            startPlayback();
        } 
        else if (isDASH) {
            // Utilisation de Shaka Player pour le DASH
            shaka.polyfill.installAll();
            shakaPlayer = new shaka.Player(video);
            try {
                await shakaPlayer.load(url);
                startPlayback();
                toggleWakeLock(true);
            } catch (e) {
                console.error("Erreur Shaka DASH:", e);
                loader.style.display = 'none';
            }
        } 
        else if (Hls.isSupported()) {
            // Utilisation de HLS.js pour le M3U8
            hls = new Hls({ maxBufferLength: 30, manifestLoadingMaxRetry: 3 });
            hls.loadSource(url);
            hls.attachMedia(video);
            hls.on(Hls.Events.MANIFEST_PARSED, () => {
                if (hls.levels.length > 1) {
                    qualitySelect.style.display = 'block';
                    qualitySelect.innerHTML = '<option value="-1">Qualité : Auto</option>' +
                        hls.levels.map((l, i) => {
                            const label = l.height ? `${l.height}p` : `Source ${i+1}`;
                            return `<option value="${i}">${label}</option>`;
                        }).join('');
                }
                startPlayback();
                toggleWakeLock(true);
            });
            hls.on(Hls.Events.ERROR, (event, data) => { if (data.fatal) loader.style.display = 'none'; });
        }
    }
    
    // --- 5. LOGIQUE PRIVÉE & MODALE (VERSION AVEC DÉCONNEXION) ---
function setupPrivateUI() {
    const lockBtn = document.getElementById('lockBtn');
    const addBtnNav = document.getElementById('addChannelBtn');
    
    if (isAuthorized) {
        lockBtn.innerHTML = "🔓 Section Privée";
        lockBtn.style.color = "var(--primary-color)";
        if(addBtnNav) addBtnNav.style.display = "flex";
        
        // AJOUT : Clic droit (Context Menu) pour déconnexion rapide
        lockBtn.oncontextmenu = (e) => {
            e.preventDefault();
            if(confirm("Fermer la session privée ?")) {
                lockPrivateSection();
            }
        };
    } else {
        lockBtn.innerHTML = "🔒 Déverrouiller";
        lockBtn.style.color = "";
        if(addBtnNav) addBtnNav.style.display = "none";
        lockBtn.oncontextmenu = null;
    }

    lockBtn.onclick = async (e) => {
    if (e.button === 2) return; 

    if (!isAuthorized) {
        const code = prompt("Code d'accès :");
        if (code === "2026") {
            // Affiche le loader pendant le traitement lourd
            loader.style.display = 'block';
            channelList.innerHTML = '<div class="loader-text" style="text-align:center; padding:20px;">Déchiffrement de la section privée...</div>';

            isAuthorized = true;
            localStorage.setItem("freelink_private_access", "true");
            resetSessionTimer();
            
            await init(); 
            
            filteredChannels = allChannels;
            displayChannels();
            loader.style.display = 'none';
        }
    } else {
        // Logique de bascule d'affichage
        const query = searchInput.value.toLowerCase().trim();
        const isOnlyPrivate = filteredChannels.every(ch => ch.private);
        if (!isOnlyPrivate) {
            filteredChannels = allChannels.filter(ch => ch.private && ch.name.toLowerCase().includes(query));
            lockBtn.innerHTML = "👁️ Voir Tout";
        } else {
            filteredChannels = (query === "") ? allChannels : allChannels.filter(ch => ch.name.toLowerCase().includes(query));
            lockBtn.innerHTML = "🔓 Section Privée";
        }
        displayChannels();
    }
};
}

    window.saveNewChannel = () => {
        const name = document.getElementById('newChannelName').value.trim();
        const url = document.getElementById('newChannelUrl').value.trim();
        if (!name || !url) return alert("Champs vides !");
        const newEntry = { name: "👤 " + name, url: url, group: { title: "MES FLUX" }, tvg: { logo: "" }, private: true };
        userChannels.push(newEntry);
        localStorage.setItem('freelink_user_channels', JSON.stringify(userChannels));
        allChannels.unshift(newEntry); 
        filteredChannels = allChannels;
        document.getElementById('newChannelName').value = '';
        document.getElementById('newChannelUrl').value = '';
        modal.style.display = 'none';
        displayChannels();
        updateCategories();
    };

    // --- 6. NAVIGATION ET ÉVÉNEMENTS ---
    document.addEventListener('keydown', (e) => {
        if (['ArrowUp', 'ArrowDown', 'Enter'].includes(e.key)) window.navigationMode = 'keyboard';
        if (e.key === 'ArrowDown' && document.activeElement === searchInput) {
            const first = channelList.querySelector('.channel');
            if (first) { e.preventDefault(); first.focus(); }
        }
        if (['ArrowUp', 'ArrowDown'].includes(e.key)) {
            const channels = Array.from(channelList.querySelectorAll('.channel'));
            const currentIndex = channels.indexOf(document.activeElement);
            if (currentIndex === -1) return;
            e.preventDefault();
            let nextIndex = (e.key === 'ArrowDown') 
                ? (currentIndex + 1 < channels.length ? currentIndex + 1 : 0)
                : (currentIndex - 1 >= 0 ? currentIndex - 1 : channels.length - 1);
            channels[nextIndex].focus();
            channels[nextIndex].scrollIntoView({ block: 'nearest', behavior: 'smooth' });
        }
    });

    searchInput.oninput = () => {
        const query = searchInput.value.toLowerCase().trim();
        const basePool = showingFavorites ? favorites : (isAuthorized ? allChannels : allChannels.filter(c => !c.private));
        filteredChannels = basePool.filter(ch => ch.name.toLowerCase().includes(query));
        displayChannels();
    };

    document.getElementById('favQuickAccess').onclick = function() {
        showingFavorites = !showingFavorites;
        this.classList.toggle('active', showingFavorites);
        filteredChannels = showingFavorites ? favorites : (isAuthorized ? allChannels : allChannels.filter(c => !c.private));
        this.innerHTML = `⭐ ${showingFavorites ? 'Voir Tout' : 'Favoris'} (<span id="favCount">${favorites.length}</span>)`;
        displayChannels();
    };

    document.getElementById('addChannelBtn').onclick = () => modal.style.display = 'flex';
    // À ajouter ou vérifier dans la section des fonctions
function closeModal() {
    modal.style.display = 'none';
}
window.closeModal = closeModal;

    // WakeLock & Volume
    async function toggleWakeLock(isActive) {
        if (!('wakeLock' in navigator)) return;
        try {
            if (isActive && !wakeLock) wakeLock = await navigator.wakeLock.request('screen');
            else if (!isActive && wakeLock) { await wakeLock.release(); wakeLock = null; }
        } catch (err) {}
    }

    video.onvolumechange = () => {
        if (!video.muted && video.volume > 0) localStorage.setItem('freelink_volume', video.volume);
    };

    // Scroll Infini
    channelList.addEventListener('scroll', () => {
        if (channelList.scrollTop + channelList.clientHeight >= channelList.scrollHeight - 100) {
            if (displayedCount < filteredChannels.length) {
                displayedCount += 100;
                displayChannels(true);
            }
        }
    });

    // Lancement final
    init();

    // Export des fonctions pour le HTML global
    function updateCategories() {
    const categorySet = new Set();
    
    // On ne boucle qu'une fois sur allChannels
    allChannels.forEach(ch => {
        const title = (ch.group && ch.group.title) ? ch.group.title : "Général";
        if(title.length > 1) categorySet.add(title);
    });

    const sortedCategories = Array.from(categorySet).sort();
    
    categoryFilter.innerHTML = '<option value="all">Toutes les catégories</option>';
    sortedCategories.forEach(cat => {
        const opt = document.createElement('option');
        opt.value = cat;
        opt.innerText = cat;
        categoryFilter.appendChild(opt);
    });
}

    function updateFavCount() {
        const countSpan = document.getElementById('favCount');
        if (countSpan) countSpan.innerText = favorites.length;
    }

    function updateLoadMoreButton() {
        loadMoreBtn.style.display = (displayedCount < filteredChannels.length) ? 'block' : 'none';
    }

    function toggleFavorite(channel) {
        const index = favorites.findIndex(f => f.url === channel.url);
        if (index === -1) favorites.push({ ...channel });
        else favorites = favorites.filter(f => f.url !== channel.url);
        localStorage.setItem('freelink_favs', JSON.stringify(favorites));
        updateFavCount();
        if (showingFavorites) {
            filteredChannels = favorites;
            displayChannels();
        } else {
            const btn = document.querySelector(`.channel[data-url="${CSS.escape(channel.url)}"] .fav-btn`);
            if (btn) btn.classList.toggle('active', index === -1);
        }
    }

    function handleAutoResume() {
        const lastUrl = localStorage.getItem('freelink_last_channel');
        const lastIdx = allChannels.findIndex(ch => ch.url === lastUrl);
        if (lastIdx > -1 && (!allChannels[lastIdx].private || isAuthorized)) {
            if (lastIdx >= displayedCount) { displayedCount = lastIdx + 10; displayChannels(false); }
            playStream(allChannels[lastIdx]);
            setTimeout(() => {
                const el = document.querySelector(`.channel[data-url="${CSS.escape(lastUrl)}"]`);
                if (el) el.scrollIntoView({ block: 'center' });
            }, 1200);
        }
    }

    // --- 7. FONCTIONS DE MAINTENANCE ET FILTRES ---

// Gestion du bouton "Actualiser" (Refresh)
const refreshBtn = document.getElementById('refreshBtn');
if (refreshBtn) {
    refreshBtn.onclick = () => {
        refreshBtn.style.transition = "transform 0.5s ease";
        refreshBtn.style.transform = "rotate(360deg)";
        
        channelList.innerHTML = '<div class="loader-text" style="text-align:center; padding:20px;">Actualisation...</div>';
        
        // Relance l'init
        init();

        setTimeout(() => {
            refreshBtn.style.transform = "rotate(0deg)";
            refreshBtn.style.transition = "none";
        }, 500);
    };
}

// Filtre par catégorie
categoryFilter.onchange = () => {
    showingFavorites = false; // On quitte le mode favoris si on change de catégorie
    const btnFav = document.getElementById('favQuickAccess');
    if (btnFav) btnFav.classList.remove('active');

    const cat = categoryFilter.value;
    const basePool = isAuthorized ? allChannels : allChannels.filter(ch => !ch.private);
    
    filteredChannels = (cat === 'all') 
        ? basePool 
        : basePool.filter(ch => ch.group && ch.group.title === cat);
    
    displayChannels();
};

// --- SYSTÈME DE VERROUILLAGE AUTOMATIQUE ---

function lockPrivateSection() {
    isAuthorized = false;
    localStorage.removeItem("freelink_private_access");
    
    const lastUrl = localStorage.getItem('freelink_last_channel');
    const currentChannel = allChannels.find(ch => ch.url === lastUrl);
    
    if (currentChannel && currentChannel.private) {
        if (hls) { hls.destroy(); hls = null; }
        video.pause();
        video.src = "";
        const info = document.getElementById('currentChannelInfo');
        if(info) info.style.display = 'none';
        console.log("🔒 Session expirée : Accès privé révoqué.");
    }

    filteredChannels = allChannels.filter(ch => !ch.private); 
    updateCategories();
    setupPrivateUI(); 
    displayChannels();    
}

function resetSessionTimer() {
    if (!isAuthorized) return; 
    clearTimeout(sessionTimeout);
    sessionTimeout = setTimeout(() => {
        // Verrouillage automatique après 10 minutes d'inactivité
        lockPrivateSection();
    }, INACTIVITY_DELAY);
}

// Écouteurs d'activité
['mousedown', 'mousemove', 'keypress', 'touchstart', 'scroll'].forEach(name => {
    document.addEventListener(name, resetSessionTimer, {passive: true});
});

// --- 8. SYSTÈME (POPSTATE & MENU) ---
window.addEventListener('popstate', () => {
    if (sidebar.classList.contains('open')) {
        sidebar.classList.remove('open');
    }
});

document.getElementById('menuToggle').onclick = () => { 
    sidebar.classList.toggle('open');
    if(sidebar.classList.contains('open')) {
        history.pushState({menu: 'open'}, null, "");
    }
};

// --- 9. GESTION FINALE DU SON ---

// Fonction unique pour réactiver le son
function unmuteVideo() {
    if (video.muted) {
        video.muted = false;
        const vol = localStorage.getItem('freelink_volume');
        const parsedVol = parseFloat(vol);
        video.volume = !isNaN(parsedVol) ? parsedVol : 0.5;
        
        errorMessage.style.display = 'none';
    }
}

// 1. Clic sur le bouton flottant lui-même
errorMessage.onclick = (e) => {
    e.stopPropagation();
    unmuteVideo();
};

// 2. Clic n'importe où sur la page (pour le premier chargement)
document.addEventListener('click', unmuteVideo, { once: true });

// 3. Clic sur la zone vidéo
video.addEventListener('click', unmuteVideo);

// Rendre les fonctions accessibles depuis le HTML (onclick)
window.saveNewChannel = saveNewChannel;
window.closeModal = closeModal;
window.unmuteVideo = unmuteVideo;

</script>
<script>
  if ('serviceWorker' in navigator) {
 navigator.serviceWorker.register('./sw.js', { scope: './' })
      .then(reg => {
        console.log("PWA : Service Worker enregistré avec succès");

    reg.addEventListener('updatefound', () => {
      const installingWorker = reg.installing;
      installingWorker.onstatechange = () => {
        if (installingWorker.state === 'installed') {
          if (navigator.serviceWorker.controller) {
            // Une mise à jour est prête, mais on ne force pas le reload 
            // pour ne pas interrompre l'expérience utilisateur ou l'installation.
            console.log("Nouvelle version téléchargée. Elle sera active au prochain démarrage.");
          } else {
            // Contenu mis en cache pour la première fois
            console.log("L'application est maintenant prête pour une utilisation hors-ligne.");
          }
        }
      };
    });
  }).catch(error => {
    console.error("Erreur lors de l'enregistrement du Service Worker :", error);
  });
}
</script>
